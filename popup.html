<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="css/popup.css">
  <link rel="stylesheet" type="text/css" href="css/all.min.css">
  <title>Yape</title>
</head>

<body>
  <div class="d-flex align-items-center" style="margin-bottom: 8px">
    <div class="font-weight-bold">Current Downloads</div>
    <div id="totalSpeed" class="font-weight-bold" style="margin-left: 4px"></div>
    <div class="ms-auto">
      <button id="pauseButton" class="btn" disabled>
        <i id="pauseIcon" class="fa fa-pause small"></i>
      </button>
      <button id="limitSpeedButton" class="btn" disabled>
        <i class="fa fa-infinity small"></i>
      </button>
      <button id="externalLinkButton" class="btn">
        <i class="fa fa-external-link-alt small"></i>
      </button>
      <button id="optionsButton" class="btn">
        <i class="fa fa-cog small"></i>
      </button>
    </div>
  </div>

  <div id="captchaAlert" class="alert alert-warning py-2 small text-center mb-2" hidden>
    <i class="fa fa-robot me-2"></i>Captcha waiting —
    <span id="captchaLink" style="cursor:pointer; text-decoration:underline">open PyLoad</span>
  </div>

  <div id="status">
    <div class="d-flex justify-content-center">
      <div class="spinner-border text-primary m-3"></div>
    </div>
  </div>

  <div id="freeSpaceDiv" class="text-center text-muted small mt-1" hidden></div>

  <div id="actionButtons" class="d-flex justify-content-center gap-2 mt-2" hidden>
    <button id="stopAllButton" class="btn btn-sm btn-outline-danger">
      <i class="fa fa-stop me-1"></i>Stop all
    </button>
    <button id="restartFailedButton" class="btn btn-sm btn-outline-warning">
      <i class="fa fa-redo me-1"></i>Retry failed
    </button>
    <button id="deleteFinishedButton" class="btn btn-sm btn-outline-secondary">
      <i class="fa fa-check me-1"></i>Clear finished
    </button>
  </div>

  <div id="pageDownloadDiv" hidden>
    <div class="dropdown-divider" style="margin: 20px 0 12px;"></div>
    <label class="font-weight-bold">Page Download</label>
    <div id="downloadDiv" class="text-center m-2" hidden>
      <div id="downloadLabel"></div>
      <button type="button" class="btn btn-primary" id="download" style="margin-top: 12px">Start Download</button>
    </div>
  </div>

  <div class="text-center m-3">
    <div class="alert alert-danger" id="error" hidden></div>
    <div class="alert alert-success" id="success" hidden></div>
  </div>

</body>

<script type="text/javascript" src="js/lib/purify.min.js"></script>
<script type="module" src="popup.js"></script>
</html>
