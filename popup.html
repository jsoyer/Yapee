<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="js/theme.js"></script>
  <link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="css/popup.css">
  <link rel="stylesheet" type="text/css" href="css/all.min.css">
  <title>Yapee</title>
</head>

<body>
  <div class="d-flex align-items-center flex-nowrap" style="margin-bottom: 8px">
    <div class="font-weight-bold text-nowrap" data-i18n="popupCurrentDownloads">Current Downloads</div>
    <div id="totalSpeed" class="font-weight-bold text-nowrap" style="margin-left: 4px"></div>
    <span id="queueEta" class="text-muted small text-nowrap" style="margin-left: 4px"></span>
    <select id="serverSelect" class="form-select form-select-sm ms-2 flex-shrink-1" style="width: auto; min-width: 0; font-size: 11px; padding: 1px 20px 1px 6px; height: auto" hidden></select>
    <div class="ms-auto flex-shrink-0" style="white-space: nowrap">
      <button id="pauseButton" class="btn" disabled data-i18n-aria="ariaPause" aria-label="Pause downloads">
        <i id="pauseIcon" class="fa fa-pause small"></i>
      </button>
      <button id="limitSpeedButton" class="btn" disabled data-i18n-aria="ariaSpeedLimit" aria-label="Toggle speed limit">
        <i class="fa fa-infinity small"></i>
      </button>
      <input type="number" id="maxSpeedInput" class="form-control form-control-sm"
        style="width: 70px; display: inline-block; font-size: 11px; padding: 1px 4px; height: 24px; vertical-align: middle"
        min="0" max="100000" step="50" hidden
        data-i18n-title="ariaMaxSpeed" title="Max speed (KB/s)"
        data-i18n-placeholder="popupMaxSpeedPlaceholder" placeholder="KB/s">
      <button id="proxyButton" class="btn" disabled data-i18n-aria="ariaProxy" aria-label="Toggle proxy">
        <i class="fa fa-exchange-alt small"></i>
      </button>
      <button id="externalLinkButton" class="btn" data-i18n-aria="ariaOpenPyload" aria-label="Open PyLoad">
        <i class="fa fa-external-link-alt small"></i>
      </button>
      <button id="optionsButton" class="btn" data-i18n-aria="ariaSettings" aria-label="Settings">
        <i class="fa fa-cog small"></i>
      </button>
    </div>
  </div>

  <div id="viewTabs" class="d-flex gap-1 mb-2" style="font-size: small" hidden>
    <button id="downloadsTab" class="btn btn-sm btn-primary" data-i18n="popupDownloads">Downloads</button>
    <button id="queueTab" class="btn btn-sm btn-outline-secondary" data-i18n="popupQueue">Queue</button>
    <button id="collectorTab" class="btn btn-sm btn-outline-secondary" data-i18n="popupCollector">Collector</button>
    <button id="historyTab" class="btn btn-sm btn-outline-secondary" data-i18n="popupHistory">History</button>
  </div>

  <div id="filterBar" class="d-flex gap-1 mb-2 align-items-center" style="font-size: small" hidden>
    <input type="text" id="searchInput" class="form-control form-control-sm flex-grow-1" data-i18n-placeholder="popupFilter" placeholder="Filter...">
    <select id="statusFilter" class="form-select form-select-sm" style="width: auto; font-size: 11px">
      <option value="" data-i18n="popupFilterAll">All statuses</option>
      <option value="downloading">Downloading</option>
      <option value="failed">Failed</option>
      <option value="offline">Offline</option>
      <option value="waiting">Waiting</option>
    </select>
  </div>

  <div id="captchaAlert" class="mb-2" hidden>
    <div class="alert alert-warning py-2 small mb-1">
      <i class="fa fa-robot me-2"></i><span data-i18n="popupCaptchaRequired">Captcha required —</span>
      <span id="captchaLink" style="cursor:pointer; text-decoration:underline" data-i18n="popupOpenPyload">open PyLoad</span>
    </div>
    <img id="captchaImage" class="d-block mx-auto mb-1" style="max-width:100%; border-radius:4px" alt="captcha" hidden>
    <div id="captchaForm" class="d-flex gap-1" hidden>
      <input type="text" id="captchaInput" class="form-control form-control-sm" data-i18n-placeholder="popupTypeAnswer" placeholder="Type answer...">
      <button id="captchaSubmit" class="btn btn-sm btn-warning">OK</button>
    </div>
    <div id="captchaTimer" class="small text-warning"></div>
  </div>

  <div id="status">
    <div class="d-flex justify-content-center">
      <div class="spinner-border text-primary m-3"></div>
    </div>
  </div>

  <div id="batchBar" class="d-flex gap-1 mb-2 align-items-center" hidden>
    <input type="checkbox" id="selectAllQueue" class="form-check-input" data-i18n-aria="popupSelectAll" aria-label="Select all">
    <span id="batchCount" class="text-muted small flex-grow-1"></span>
    <button id="batchDeleteBtn" class="btn btn-sm btn-outline-danger" hidden>
      <i class="fa fa-trash me-1"></i><span data-i18n="popupBatchDelete">Delete</span>
    </button>
  </div>
  <div id="queueDiv" hidden></div>
  <div id="collectorDiv" hidden></div>
  <div id="historyDiv" hidden></div>

  <div id="freeSpaceDiv" class="text-center text-muted small mt-1" hidden></div>
  <div id="serverVersionDiv" class="text-center text-muted small" hidden></div>
  <div id="statsDiv" class="text-center text-muted small" hidden></div>
  <div id="statsDashboard" class="small mt-1" hidden>
    <div id="statsSummary" class="text-center text-muted"></div>
    <div id="statsHosterTable" class="mt-1"></div>
    <div class="text-center mt-1">
      <button id="clearHistoryBtn" class="btn btn-sm btn-outline-secondary" data-i18n="popupClearHistory">Clear history</button>
    </div>
  </div>

  <div id="actionButtons" class="d-flex justify-content-center gap-2 mt-2" hidden>
    <button id="stopAllButton" class="btn btn-sm btn-outline-danger">
      <i class="fa fa-stop me-1"></i><span data-i18n="popupStopAll">Stop all</span>
    </button>
    <button id="restartFailedButton" class="btn btn-sm btn-outline-warning">
      <i class="fa fa-redo me-1"></i><span data-i18n="popupRetryFailed">Retry failed</span>
    </button>
    <button id="deleteFinishedButton" class="btn btn-sm btn-outline-secondary">
      <i class="fa fa-check me-1"></i><span data-i18n="popupClearFinished">Clear finished</span>
    </button>
  </div>

  <div id="multiUrlDiv" hidden>
    <div class="dropdown-divider" style="margin: 12px 0 8px;"></div>
    <label class="font-weight-bold" data-i18n="popupAddUrls">Add URLs</label>
    <input type="text" id="packageNameInput" class="form-control form-control-sm mt-1" data-i18n-placeholder="popupPackageName" placeholder="Package name (optional)">
    <textarea id="multiUrlInput" class="form-control form-control-sm mt-1" rows="3" data-i18n-placeholder="popupOneUrlPerLine" placeholder="One URL per line"></textarea>
    <select id="existingPackageSelect" class="form-select form-select-sm mt-1" hidden>
      <option value="" data-i18n="popupNewPackage">New package</option>
    </select>
    <button id="multiUrlButton" class="btn btn-sm btn-primary mt-1 w-100" data-i18n="popupAddAll">Add all</button>
  </div>

  <div id="containerUploadDiv" hidden>
    <div class="dropdown-divider" style="margin: 12px 0 8px;"></div>
    <label class="font-weight-bold" data-i18n="popupUploadContainer">Upload Container</label>
    <div class="small text-muted mb-1" data-i18n="popupUploadContainerHelp">Upload a .dlc, .ccf or .rsdf file</div>
    <div class="d-flex gap-1">
        <input type="file" id="containerFileInput" class="form-control form-control-sm" accept=".dlc,.ccf,.rsdf">
        <button id="containerUploadButton" class="btn btn-sm btn-primary" data-i18n="popupUploadButton">Upload</button>
    </div>
  </div>

  <div id="pageDownloadDiv" hidden>
    <div class="dropdown-divider" style="margin: 20px 0 12px;"></div>
    <label class="font-weight-bold" data-i18n="popupPageDownload">Page Download</label>
    <div id="downloadDiv" class="text-center m-2" hidden>
      <div id="downloadLabel"></div>
      <button type="button" class="btn btn-primary" id="download" style="margin-top: 12px" data-i18n="popupStartDownload">Start Download</button>
    </div>
  </div>

  <div class="text-center m-3">
    <div class="alert alert-danger" id="error" hidden></div>
    <div class="alert alert-success" id="success" hidden></div>
  </div>

</body>

<script type="text/javascript" src="js/lib/purify.min.js"></script>
<script type="module" src="popup.js"></script>
</html>
